services:
  postgres:
    image: postgres:17-alpine
    container_name: apibasica-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: apibasica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apibasica"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data: